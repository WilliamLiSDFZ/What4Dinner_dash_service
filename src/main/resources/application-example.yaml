server:
  port: 8081
  servlet:
    context-path: /api

spring:
  application:
    name: Your-Application-Name

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/database}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:password}
  sql:
    init:
      mode: always

jwt:
  private-key: classpath:keys/your-private.pem
  public-key: classpath:keys/your-public.pem
  expiration-minutes: 60
